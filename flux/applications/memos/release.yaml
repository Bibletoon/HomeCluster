apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: memos
    namespace: memos
spec:
    interval: 10m
    chart:
        spec:
            chart: memos
            version: '0.51.0'
            sourceRef:
                kind: HelmRepository
                name: zekker6
                namespace: memos
            interval: 1h
    values:
      ingress:
          main:
             enabled: true
             ingressClassName: traefik
             hosts:
                - host: memos.bibletoon.xyz
                  paths:
                    - path: /
                      pathType: Prefix
      env:
         MEMOS_DRIVER: postgres
         MEMOS_DSN:
           valueFrom:
             secretKeyRef:
               name: memos-postgres-app
               key: uri
         MEMOS_INSTANCE_URL: 'https://memos.bibletoon.xyz'
