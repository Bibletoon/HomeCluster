apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: issueneter
    namespace: issueneter
spec:
    interval: 10m
    chart:
        spec:
            chart: application
            version: '4.2.6'
            sourceRef:
                kind: HelmRepository
                name: stakater
                namespace: application
            interval: 1h
    values:
        applicationName: "pugzdec"
        deployment:
            enabled: true
            reloadOnChange: true
            volumes:
                config:
                    secret:
                        secretName: issueneter
            volumeMounts:
                config:
                    mountPath: /app
            image:
                repository: bibletoon/pugzdec
                tag: 0.0.1
            containerSecurityContext:
                readOnlyRootFilesystem: false
                runAsNonRoot: false
        service:
            enabled: true
        ingress:
            enabled: true
            ingressClassName: traefik
            hosts:
                - host: pugzdec.bibletoon.xyz
                  paths:
                      - path: /
