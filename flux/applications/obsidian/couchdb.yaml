apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: obsidian-db
    namespace: obsidian
spec:
    interval: 10m
    chart:
        spec:
            chart: couchdb
            version: '4.5.x'
            sourceRef:
                kind: HelmRepository
                name: couchdb
                namespace: couchdb
            interval: 10m
    values:
        clusterSize: 2
        couchdbConfig:
            couchdb:
                uuid: 01919269-bd8c-73bf-92e9-60234ddbcc1f
            chttpd:
                require_valid_user: true
        persistentVolume:
            enabled: true
            size: 10Gi
            storageClass: longhorn
        ingress:
            enabled: true
            hosts:
                - obsidiandb.bibletoon.xyz
            path: /
 