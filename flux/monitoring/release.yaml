apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: prometheus-stack
    namespace: monitoring
spec:
    interval: 10m
    chart:
        spec:
            chart: kube-prometheus-stack
            version: '61.9.x'
            sourceRef:
                kind: HelmRepository
                name: prometheus-community
                namespace: monitoring
            interval: 10m
    values:
        namespaceOverride: monitoring
        prometheus:
            ingress:
                enabled: true
                ingressClassName: traefik
                annotations:
                    traefik.ingress.kubernetes.io/router.middlewares: default-allow-local-only@kubernetescrd
                hosts:
                    - prometheus.home
            prometheusSpec:
                ruleSelectorNilUsesHelmValues: false
                ruleSelector: {}
                serviceMonitorSelectorNilUsesHelmValues: false
                serviceMonitorSelector: {}
                serviceMonitorNamespaceSelector: {}
                podMonitorSelectorNilUsesHelmValues: false
                podMonitorSelector: {}
                podMonitorNamespaceSelector: {}
                probeSelectorNilUsesHelmValues: false
                probeSelector: {}
                probeNamespaceSelector: {}
                scrapeConfigSelectorNilUsesHelmValues: false
                scrapeConfigSelector: {}
                scrapeConfigNamespaceSelector: {}
                retention: 5d
                retentionSize: 45GB
                storageSpec:
                    volumeClaimTemplate:
                        spec:
                            storageClassName: "longhorn"
                            accessModes: ["ReadWriteMany"]
                            resources:
                                requests:
                                    storage: 50Gi
        grafana:
            ingress:
                enabled: true
                ingressClassName: traefik
                hosts:
                    - grafana.bibletoon.xyz
                annotations:
                    traefik.ingress.kubernetes.io/router.middlewares: authentik-auth-middleware@kubernetescrd
            persistence:
                enabled: true
                storageClassName: "longhorn"
                accessModes:
                    - ReadWriteMany
                size: 10Gi
            envFromSecret: grafana-auth
            grafana.ini:
                auth:
                    signout_redirect_url: "https://authentik.company/application/o/grafana/end-session/"
                    oauth_auto_login: true
                auth.generic_oauth:
                    name: authentik
                    enabled: true
                    client_id: '${CLIENT_ID}'
                    client_secret: '${CLIENT_ID}'
                    scopes: "openid profile email"
                    auth_url: "https://auth.bibletoon.xyz/application/o/authorize/"
                    token_url: "https://auth.bibletoon.xyz/application/o/token/"
                    api_url: "https://auth.bibletoon.xyz/application/o/userinfo/"
                    # Optionally map user groups to Grafana roles
                    role_attribute_path: contains(groups, 'Grafana Admins') && 'Admin' || contains(groups, 'Grafana Editors') && 'Editor' || 'Viewer'
        kubeEtcd:
            enabled: false
        alertmanager:
            alertmanagerSpec:
                storage:
                    volumeClaimTemplate:
                        spec:
                            storageClassName: "longhorn"
                            accessModes: ["ReadWriteMany"]
                            resources:
                                requests:
                                    storage: 10Gi
            ingress:
                enabled: true
                ingressClassName: traefik
                annotations:
                    traefik.ingress.kubernetes.io/router.middlewares: default-allow-local-only@kubernetescrd
                hosts:
                    - alerts.home
