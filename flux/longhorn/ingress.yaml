apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
    name: longhorn-ingress
    namespace: longhorn
    annotations:
        kubernetes.io/ingress.class: traefik
spec:
    rules:
        - host: "longhorn.home"
          http:
              paths:
                  - path: /
                    pathType: Prefix
                    backend:
                        service:
                            name: longhorn-svc
                            port:
                                number: 8000
                                kind: Service