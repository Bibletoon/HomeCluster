apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: prometheus-stack
    namespace: prometheus-stack
spec:
    interval: 10m
    chart:
        spec:
            chart: kube-prometheus-stack
            version: '86.2.x'
            sourceRef:
                kind: HelmRepository
                name: prometheus-community
                namespace: prometheus-stack
            interval: 10m
    values:
        namespaceOverride: prometheus-stack
        prometheus:
            ingress:
                enabled: true
                ingressClassName: traefik-internal
                hosts:
                    - prometheus.biblehome.xyz
            service:
                type: LoadBalancer
            prometheusSpec:
                replicas: 3
                ruleSelectorNilUsesHelmValues: false
                ruleSelector: {}
                serviceMonitorSelectorNilUsesHelmValues: false
                serviceMonitorSelector: {}
                serviceMonitorNamespaceSelector: {}
                podMonitorSelectorNilUsesHelmValues: false
                podMonitorSelector: {}
                podMonitorNamespaceSelector: {}
                probeSelectorNilUsesHelmValues: false
                probeSelector: {}
                probeNamespaceSelector: {}
                scrapeConfigSelectorNilUsesHelmValues: false
                scrapeConfigSelector: {}
                scrapeConfigNamespaceSelector: {}
                persistentVolumeClaimRetentionPolicy:
                retention: 5d
                retentionSize: 45GB
                storageSpec:
                    volumeClaimTemplate:
                        spec:
                            storageClassName: "longhorn-sr"
                            accessModes: ["ReadWriteOnce"]
                            resources:
                                requests:
                                    storage: 50Gi
        grafana:
            enabled: false
        kubeEtcd:
            enabled: true
            endpoints:
                - 192.168.2.11
                - 192.168.2.21
                - 192.168.2.31
            service:
                enabled: true
                port: 2381
                targetPort: 2381
        alertmanager:
            tplConfig: true
            config:
                global:
                    resolve_timeout: 5m
                    http_config:
                        proxy_from_environment: true
                inhibit_rules:
                    - equal:
                          - namespace
                          - alertname
                      source_matchers:
                          - severity = critical
                      target_matchers:
                          - severity =~ warning|info
                    - equal:
                          - namespace
                          - alertname
                      source_matchers:
                          - severity = warning
                      target_matchers:
                          - severity = info
                    - equal:
                          - namespace
                      source_matchers:
                          - alertname = InfoInhibitor
                      target_matchers:
                          - severity = info
                    - target_matchers:
                          - alertname = InfoInhibitor
                receivers:
                    - name: "null"
                    - name: 'telegram_bot'
                      telegram_configs:
                          - bot_token: '{{ .Values.telegram_token }}'
                            api_url: 'https://api.telegram.org'
                            chat_id: 412750554
                            parse_mode: 'HTML'
                            message: '{{ "{{ template \"telegram.message\" . }}" }}'
                route:
                    group_by:
                        - namespace
                    group_interval: 5m
                    group_wait: 30s
                    receiver: "telegram_bot"
                    repeat_interval: 12h
                    routes:
                        - matchers:
                              - alertname = "Watchdog"
                              - alertname = "KubeControllerManagerDown"
                              - alertname = "KubeProxyDown"
                              - alertname = "KubeSchedulerDown"
                          receiver: "null"
                templates:
                    - /etc/alertmanager/config/*.tmpl
            templateFiles:
                telegram.tmpl: |-
                  {{ define "alert_list" }}{{ range . }}
                  ---
                  🪪 <b>{{ .Labels.alertname }}</b>
                  {{- if eq .Labels.severity "critical" }}
                  🚨 CRITICAL 🚨 {{ end }}
                  {{- if eq .Labels.severity "warning" }}
                  ⚠️ WARNING ⚠️{{ end }}
                  {{- if .Annotations.summary }}
                  📝 {{ .Annotations.summary }}{{ end }}
                  {{- if .Annotations.description }}
                  📖 {{ .Annotations.description }}{{ end }}

                  🏷 Labels:
                  {{ range .Labels.SortedPairs }}  <i>{{ .Name }}</i>: <code>{{ .Value }}</code>
                  {{ end }}{{ end }}
                  🛠 <a href="https:/grafana.bibletoon.xyz">Grafana</a> 💊 <a href="https://alerts.biblehome.xyz">Alertmanager</a> 💊
                  {{ end }}

                  {{ define "telegram.message" }}
                  {{ if gt (len .Alerts.Firing) 0 }}
                  🔥 Alerts Firing 🔥
                  {{ template "alert_list" .Alerts.Firing }}
                  {{ end }}
                  {{ if gt (len .Alerts.Resolved) 0 }}
                  ✅ Alerts Resolved ✅
                  {{ template "alert_list" .Alerts.Resolved }}
                  {{ end }}
                  {{ end }}
            alertmanagerSpec:
                replicas: 3
                containers:
                    - name: alertmanager
                      env:
                          - name: HTTP_PROXY
                            value: "http://192.168.2.60:7890"
                          - name: HTTPS_PROXY
                            value: "http://192.168.2.60:7890"
                          - name: NO_PROXY
                            value: "localhost,127.0.0.1,10.0.0.0/8,.svc,.cluster.local,192.168.0.0/16"
                storage:
                    volumeClaimTemplate:
                        spec:
                            storageClassName: "longhorn-sr"
                            accessModes: ["ReadWriteOnce"]
                            resources:
                                requests:
                                    storage: 5Gi
            ingress:
                enabled: true
                ingressClassName: traefik-internal
                hosts:
                    - alerts.biblehome.xyz
    valuesFrom:
        - kind: Secret
          targetPath: telegram_token
          name: telegram
          valuesKey: token
