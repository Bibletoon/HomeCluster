apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: prometheus-operator
    namespace: prometheus-stack
spec:
    interval: 10m
    chart:
        spec:
            chart: prometheus-operator
            version: '9.x'
            sourceRef:
                kind: HelmRepository
                name: prometheus-community
                namespace: prometheus-stack
            interval: 10m
    values:
        kubeletService:
            enabled: true
            namespace: kube-system
            name: kubelet
