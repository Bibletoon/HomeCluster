apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: kube-state-metrics
    namespace: prometheus-stack
spec:
    interval: 10m
    chart:
        spec:
            chart: kube-state-metrics
            version: '5.x'
            sourceRef:
                kind: HelmRepository
                name: prometheus-community
                namespace: prometheus-stack
            interval: 10m
    values:
        namespaceOverride: prometheus-stack
        prometheus:
            monitor:
                enabled: true
