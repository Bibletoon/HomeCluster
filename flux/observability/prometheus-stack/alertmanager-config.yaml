apiVersion: v1
kind: Secret
metadata:
    name: alertmanager-main
    namespace: prometheus-stack
type: Opaque
stringData:
    alertmanager.yaml: |
        global:
            resolve_timeout: 5m
        inhibit_rules:
            - equal: [namespace, alertname]
              source_matchers:
                  - severity = critical
              target_matchers:
                  - severity =~ warning|info
            - equal: [namespace, alertname]
              source_matchers:
                  - severity = warning
              target_matchers:
                  - severity = info
            - equal: [namespace]
              source_matchers:
                  - alertname = InfoInhibitor
              target_matchers:
                  - severity = info
            - target_matchers:
                  - alertname = InfoInhibitor
        receivers:
            - name: "null"
            - name: telegram_bot
              telegram_configs:
                  - bot_token: $TELEGRAM_TOKEN
                    api_url: https://api.telegram.org
                    chat_id: 412750554
                    parse_mode: HTML
                    message: '{{ template "telegram.message" . }}'
        route:
            group_by: [namespace]
            group_interval: 5m
            group_wait: 30s
            receiver: telegram_bot
            repeat_interval: 12h
            routes:
                - matchers:
                      - alertname = "Watchdog"
                      - alertname = "KubeControllerManagerDown"
                      - alertname = "KubeProxyDown"
                      - alertname = "KubeSchedulerDown"
                  receiver: "null"
        templates:
            - /etc/alertmanager/configmaps/alertmanager-templates/*.tmpl
