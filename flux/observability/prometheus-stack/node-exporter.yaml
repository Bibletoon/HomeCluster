apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: prometheus-node-exporter
    namespace: prometheus-stack
spec:
    interval: 10m
    chart:
        spec:
            chart: prometheus-node-exporter
            version: '4.x'
            sourceRef:
                kind: HelmRepository
                name: prometheus-community
                namespace: prometheus-stack
            interval: 10m
    values:
        namespaceOverride: prometheus-stack
        tolerations:
            - operator: Exists
              effect: NoSchedule
            - operator: Exists
              effect: NoExecute
        prometheus:
            monitor:
                enabled: true
